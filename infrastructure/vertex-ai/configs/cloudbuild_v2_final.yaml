  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/birdclef-490003/birdclef-repo/perch-extractor:v2-final']
images:
  - 'us-central1-docker.pkg.dev/birdclef-490003/birdclef-repo/perch-extractor:v2-final'
options:
  logging: CLOUD_LOGGING_ONLY
